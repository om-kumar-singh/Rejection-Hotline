# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/rejection_hotline_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:your_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-256-bits}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Scheduler
app.scheduler.follow-up-cron=0 0 8 * * *
app.scheduler.timezone=Asia/Kolkata
spring.task.scheduling.time-zone=Asia/Kolkata

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/import/google/callback}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
